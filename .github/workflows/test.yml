---
name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - src/**
              - tests/**
              - mise.toml
              - pyproject.toml
              - .github/workflows/test.yml

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || (needs.changes.result == 'success' && needs.changes.outputs.src == 'true'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run install

      - name: Run linter
        run: mise run lint

      - name: Run tests
        run: mise run test

  integration-test:
    name: Run Integration Tests (read-only)
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true) && (needs.changes.result == 'skipped' || (needs.changes.result == 'success' && needs.changes.outputs.src == 'true'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run install

      - name: Run integration tests (read-only)
        run: mise run test-integration
        env:
          SWITCH_PARENTAL_CONTROL_SESSION_TOKEN: ${{ secrets.SWITCH_PARENTAL_CONTROL_SESSION_TOKEN }}
          SWITCH_PARENTAL_CONTROL_TIMEZONE: ${{ secrets.SWITCH_PARENTAL_CONTROL_TIMEZONE }}
          SWITCH_PARENTAL_CONTROL_LANG: ${{ secrets.SWITCH_PARENTAL_CONTROL_LANG }}

  required:
    runs-on: ubuntu-latest
    needs: [changes, test, integration-test]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || \
                "${{ needs.changes.result }}" == "cancelled" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.test.result }}" == "cancelled" || \
                "${{ needs.integration-test.result }}" == "failure" || \
                "${{ needs.integration-test.result }}" == "cancelled" ]]; then
            exit 1
          fi