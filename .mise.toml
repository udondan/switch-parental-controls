[settings]
jobs = 1

[tools]
python = "3.14"

[tasks.install]
description = "Install dependencies (requires Python >=3.12 on PATH)"
run = "python3 -m venv .venv && .venv/bin/pip install -e '.[dev]'"

[tasks.test]
description = "Run tests"
run = ".venv/bin/pytest tests/ -v"

[tasks.run]
description = "Run the MCP server"
run = ".venv/bin/python -m nintendo_mcp"

[tasks.lint]
description = "Run linter"
run = ".venv/bin/ruff check src/ tests/"

[tasks.lint-fix]
description = "Run linter and fix issues"
run = ".venv/bin/ruff check --fix src/ tests/"

[tasks.inspect]
description = "Open MCP Inspector connected to the nintendo_mcp server"
run = "npx @modelcontextprotocol/inspector python -m nintendo_mcp"
